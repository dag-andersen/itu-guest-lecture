apiVersion: apps/v1
kind: Deployment
metadata:
  name: university-talk
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: university-talk
  template:
    metadata:
      labels:
        app: university-talk
    spec:
      containers:
        - name: university-talk
          image: university-talk:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: university-talk
  namespace: default
spec:
  selector:
    app: university-talk
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
  type: NodePort
